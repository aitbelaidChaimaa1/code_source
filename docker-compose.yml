version: '3.8'

services:

  # Base de données PostgreSQL
  postgres:
    image: postgres:15
    container_name: dataquest_db
    environment:
      POSTGRES_DB: dataquest
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Backend Python FastAPI
  backend:
    build: ./backend
    container_name: dataquest_backend
    environment:
      DB_HOST: postgres
      DB_NAME: dataquest
      DB_USER: admin
      DB_PASSWORD: password123
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  # Frontend React
  frontend:
    build: ./frontend
    container_name: dataquest_frontend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
